<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup/Login with OTP & Strong Password</title>
<style>
body {
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #f3f3f3;
}
.container {
    width: 350px;
    padding: 20px;
    background: #fff;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border-radius: 8px;
}
h2 { text-align: center; margin-bottom: 20px; }
.form-group { margin-bottom: 15px; position: relative; }
.form-group label { display: block; margin-bottom: 5px; }
.form-group input {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
.toggle-password {
    position: absolute;
    right: 10px;
    top: 65%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 1.2em;
}
button {
    width: 100%;
    padding: 10px;
    background: #007BFF;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
button:hover { background: #0056b3; }
.toggle {
    text-align: center;
    margin-top: 10px;
    cursor: pointer;
    color: #007BFF;
}
.hidden { display: none; }

</style>
</head>
<body>

<div class="container">

<!-- Signup Form -->
<div id="signup-form">
    <h2>Signup</h2>
    <form id="signup-form-element">
        <div class="form-group">
            <label for="signup-name">Name</label>
            <input type="text" id="signup-name" required>
        </div>
        <div class="form-group">
            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" required>
        </div>
        <div class="form-group">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" required>
            <span class="toggle-password" id="signup-toggle-password">👁</span>
        </div>
        <button type="submit">Signup</button>
    </form>
    <div class="toggle" id="show-login">Already have an account? Login</div>
</div>

<!-- Signup OTP Form -->
<div id="signup-otp-form" class="hidden">
    <h2>Verify Signup OTP</h2>
    <form id="signup-otp-form-element">
        <div class="form-group">
            <label for="signup-otp">Enter OTP</label>
            <input type="text" id="signup-otp" required>
        </div>
        <button type="submit">Verify OTP</button>
    </form>
</div>

<!-- Login Form -->
<div id="login-form" class="hidden">
    <h2>Login</h2>
    <form id="login-form-element">
        <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" required>
            <span class="toggle-password" id="login-toggle-password">👁</span>
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="toggle" id="show-signup">Don't have an account? Signup</div>
</div>

<!-- Login OTP Form -->
<div id="login-otp-form" class="hidden">
    <h2>Verify Login OTP</h2>
    <form id="login-otp-form-element">
        <div class="form-group">
            <label for="login-otp">Enter OTP</label>
            <input type="text" id="login-otp" required>
        </div>
        <button type="submit">Verify OTP</button>
    </form>
</div>

</div>

<script>
const signupForm = document.getElementById('signup-form');
const signupOtpForm = document.getElementById('signup-otp-form');
const loginForm = document.getElementById('login-form');
const loginOtpForm = document.getElementById('login-otp-form');

const showLogin = document.getElementById('show-login');
const showSignup = document.getElementById('show-signup');

const signupTogglePassword = document.getElementById('signup-toggle-password');
const loginTogglePassword = document.getElementById('login-toggle-password');

let currentSignupEmail = "";
let currentLoginEmail = "";

function togglePasswordVisibility(input, icon) {
    if(input.type === 'password'){ input.type='text'; icon.textContent='🙈'; }
    else { input.type='password'; icon.textContent='👁'; }
}

function isStrongPassword(password){
    return /^(?=.*[A-Z])(?=.*\d).{8,}$/.test(password);
}

function isValidEmail(email){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// Toggle password icons
signupTogglePassword.addEventListener('click', ()=> togglePasswordVisibility(document.getElementById('signup-password'), signupTogglePassword));
loginTogglePassword.addEventListener('click', ()=> togglePasswordVisibility(document.getElementById('login-password'), loginTogglePassword));

// Switch forms
showLogin.addEventListener('click', ()=> { signupForm.classList.add('hidden'); loginForm.classList.remove('hidden'); });
showSignup.addEventListener('click', ()=> { loginForm.classList.add('hidden'); signupForm.classList.remove('hidden'); });

// ===== SIGNUP =====
document.getElementById('signup-form-element').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const name = document.getElementById('signup-name').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;

    if(!isValidEmail(email)){ alert("Invalid email!"); return; }
    if(!isStrongPassword(password)){ alert("Password must be 8+ chars, include 1 uppercase & 1 number"); return; }

    try{
        const res = await fetch("https://advanced-login.onrender.com/signup", {
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({name,email,password})
        });
        if(!res.ok) throw new Error("Server error");
        const data = await res.json();
        alert(data.message);
        if(res.ok){
            currentSignupEmail = email;
            signupForm.classList.add('hidden');
            signupOtpForm.classList.remove('hidden');
        }
    } catch(err){ alert("Error: "+err.message); }
});

// ===== VERIFY SIGNUP OTP =====
document.getElementById('signup-otp-form-element').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const otp = document.getElementById('signup-otp').value;
    try{
        const res = await fetch("https://YOUR-RENDER-APP.onrender.com/verify-signup-otp", {...})
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({email: currentSignupEmail, otp})
        });
        const data = await res.json();
        alert(data.message);
        if(res.ok){
            signupOtpForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
        }
    } catch(err){ alert("Error: "+err.message); }
});

// ===== LOGIN =====
document.getElementById('login-form-element').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    try{
        const res = await fetch("https://YOUR-RENDER-APP.onrender.com/login", {...})
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({email,password})
        });
        const data = await res.json();
        alert(data.message);
        if(res.ok){
            currentLoginEmail = email;
            loginForm.classList.add('hidden');
            loginOtpForm.classList.remove('hidden');
        }
    } catch(err){ alert("Error: "+err.message); }
});

// ===== VERIFY LOGIN OTP =====
document.getElementById('login-otp-form-element').addEventListener('submit', async (e)=>{
    e.preventDefault();
    const otp = document.getElementById('login-otp').value;

    try{
        const res = await fetch("https://YOUR-RENDER-APP.onrender.com/verify-login-otp", {...})
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({email: currentLoginEmail, otp})
        });
        const data = await res.json();
        alert(data.message);
        if(res.ok){
            loginOtpForm.classList.add('hidden');
            window.location.href = "welcome.html"; // redirect after login
        }
    } catch(err){ alert("Error: "+err.message); }
});
</script>
</body>
</html>
